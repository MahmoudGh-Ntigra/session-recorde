<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RRWeb Replay + DOM + Network</title>

    <!-- rrweb player css -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/rrweb-player@latest/dist/style.css"
    />

    <style>
      body {
        font-family: Arial;
        margin: 0;
        padding: 0;
      }

      h2 {
        padding: 10px;
        margin: 0;
        background: #222;
        color: #fff;
      }

      #container {
        display: flex;
        height: 90vh;
      }

      #player {
        width: 50%;
        border-right: 1px solid #ccc;
      }

      #right-panel {
        width: 50%;
        display: flex;
        flex-direction: column;
      }

      #dom-frame {
        height: 60%;
        border-bottom: 1px solid #ccc;
      }

      #network-log {
        height: 40%;
        overflow: auto;
        padding: 10px;
        background: #111;
        color: #0f0;
        font-size: 12px;
        font-family: monospace;
      }

      .req {
        border-bottom: 1px solid #333;
        margin-bottom: 8px;
        padding-bottom: 5px;
      }

      .error {
        color: red;
      }
    </style>
  </head>

  <body>
    <h2>RRWeb Player + DOM + Network</h2>

    <input type="file" id="fileInput" />

    <div id="container">
      <!-- 🟢 PLAYER -->
      <div id="player"></div>

      <!-- 🔵 RIGHT PANEL -->
      <div id="right-panel">
        <!-- DOM VIEW -->
        <iframe id="dom-frame"></iframe>

        <!-- NETWORK -->
        <div id="network-log"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/rrweb-player@latest/dist/index.js"></script>

    <script>
      const input = document.getElementById("fileInput");

      input.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const text = await file.text();
        const data = JSON.parse(text);
        let events = data.events || data;

        startReplay(events);
      });

      function startReplay(events) {
        document.getElementById("player").innerHTML = "";
        document.getElementById("network-log").innerHTML = "";

        // 🔥 FIX #1 — ensure timestamps exist
        events = events.map((e, i) => {
          if (!e.timestamp) {
            e.timestamp = Date.now() + i; // fallback (prevents freeze)
          }
          return e;
        });

        events.sort((a, b) => a.timestamp - b.timestamp);

        // 🔥 FIX #3 — create player WITHOUT autoplay
        const player = new rrwebPlayer({
          target: document.getElementById("player"),
          props: {
            events,
          },
        });

        // 🔥 FIX #4 — force play (fix freeze issue)
        player.play();

        let lastUpdate = 0;
        const networkLog = document.getElementById("network-log");

        player.addEventListener("event-cast", (e) => {
          console.log(e);
          const event = e;

          // 🟢 DOM LIVE UPDATE
          const now = Date.now();
          if (now - lastUpdate > 300) {
            lastUpdate = now;

            const replayIframe = document.querySelector("#player iframe");
            if (replayIframe && replayIframe.contentDocument) {
              try {
                let html =
                  replayIframe.contentDocument.documentElement.outerHTML;

                // remove scripts (security)
                html = html.replace(/<script[\s\S]*?<\/script>/gi, "");

                const domFrame = document.getElementById("dom-frame");
                const frameDoc = domFrame.contentDocument;

                frameDoc.open();
                frameDoc.write(html);
                frameDoc.close();
              } catch (err) {
                console.warn("DOM error:", err);
              }
            }
          }

          if (event?.type === "custom" && event.data?.source === "network") {
            const div = document.createElement("div");
            div.className = "req";

            const time = new Date(event.timestamp).toLocaleTimeString();

            div.innerHTML = `
        <div><b>[${time}] ${event.data.method} ${event.data.url}</b></div>
        ${event.data.status ? `<div>Status: ${event.data.status}</div>` : ""}
        ${event.data.duration ? `<div>Time: ${event.data.duration} ms</div>` : ""}
        ${event.data.error ? `<div class="error">Error: ${event.data.error}</div>` : ""}
        ${event.data.response ? `<div>Response: ${escapeHtml(event.data.response)}</div>` : ""}
      `;

            networkLog.appendChild(div);
            networkLog.scrollTop = networkLog.scrollHeight;
          }
        });
      }

      // 🔒 Prevent HTML injection
      function escapeHtml(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
    </script>
  </body>
</html>
